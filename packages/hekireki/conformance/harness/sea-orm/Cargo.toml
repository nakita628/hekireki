[package]
name = "conformance"
version = "0.0.0"
edition = "2021"
publish = false

[dependencies]
# postgres-array enables Vec<T> columns for Prisma scalar lists (String[]).
sea-orm = { version = "1.1.0", features = ["postgres-array"] }
serde = { version = "1", features = ["derive"] }
# Client-side primary key generation emitted in ActiveModelBehavior::new for
# Prisma @default(uuid()) / @default(uuid(7)).
uuid = { version = "1", features = ["v4", "v7"] }

[lib]
path = "src/lib.rs"
